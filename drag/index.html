<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drag</title>
    <style>
      body {
        height: 100vh;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
      #ball {
        width: 100px;
        height: 100px;
        background: tomato;
        border-radius: 50%;
        cursor: grab;
        position: absolute;
        left: 100px;
        top: 100px;
      }
    </style>
  </head>
  <body>
    <div id="ball"></div>

    <script src="./drag.js"></script>
  </body>
</html>
